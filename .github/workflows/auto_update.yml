name: Auto Update Abitur Materials

on:
  schedule:
    # Runs every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allows manual triggering from GitHub Actions tab

jobs:
  update-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push back to repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Auto-Updater Scraper
        run: node scripts/auto-updater.js

      - name: Commit and push changes if any
        run: |
          git config --global user.name "AbiturDSV Auto-Updater"
          git config --global user.email "actions@github.com"
          git add data/*.json
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update: Import latest official written exam materials [skip ci]"
            git push origin main
          else
            echo "No updates detected. Repository is clean."
          fi
