      padding: 0 6px;
      margin: 0 4px;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.4;
    }

<script>
const SUBJECTS_META = [
  { id:'mathe',       name:'Matemáticas',nameDE:'Mathematik',  icon:'📐', color:'mathe' },
  { id:'deutsch',     name:'Alemán',     nameDE:'Deutsch',     icon:'🇩🇪', color:'deutsch' },
  { id:'englisch',    name:'Inglés',     nameDE:'Englisch',    icon:'🇬🇧', color:'englisch' },
  { id:'espanol',     name:'Español',    nameDE:'Español',     icon:'🇪🇸', color:'espanol' },
  { id:'philosophie', name:'Filosofía',  nameDE:'Philosophie', icon:'🧠', color:'philosophie' },
];

let currentSubjectId = 'mathe';

function initPage() {
  // Override setLang to render materials on change
  const originalSetLang = App.setLang;
  App.setLang = function(lang) {
    originalSetLang.call(App, lang);
    renderTabs();
    renderMaterial();
  };
  
  renderTabs();
  renderMaterial();
}

function renderTabs() {
  const lang = App.currentLang;
  const tabs = document.getElementById('subjectTabs') || document.getElementById('materialTabs');
  tabs.innerHTML = SUBJECTS_META.map(s => `
    <button class="difficulty-btn ${currentSubjectId === s.id ? 'selected easy' : ''}"
      style="min-width:100px;"
      onclick="selectSubject('${s.id}')">
      ${s.icon} ${lang === 'de' ? s.nameDE : s.name}
    </button>`).join('');
}

function selectSubject(id) {
  currentSubjectId = id;
  renderTabs();
  renderMaterial();
}

function renderMaterial() {
  const lang = App.currentLang;
  const panel = document.getElementById('materialPanel');

  if (currentSubjectId !== 'mathe') {
    panel.innerHTML = `
      <div class="card text-center" style="padding:var(--space-3xl);">
        <div style="font-size:48px;margin-bottom:var(--space-md);">📚</div>
        <h3 style="font-size:20px;font-weight:700;margin-bottom:var(--space-sm);">
          ${lang === 'de' ? 'Material bald verfügbar' : 'Material didáctico próximamente'}
        </h3>
        <p style="color:var(--text-muted);max-width:500px;margin:0 auto;">
          ${lang === 'de' 
            ? 'Das Lehrmaterial für dieses Fach wird in Kürze vom Administrator hinzugefügt. Nutze die Prüfungsgenerierung, um weiter zu üben!' 
            : 'Los apuntes y guías didácticas para esta asignatura se irán publicando poco a poco. ¡Utiliza la sección "Generar Examen" para seguir practicando con exámenes oficiales completos!'}
        </p>
      </div>
    `;
    return;
  }

  // Mathematics Content Render
  if (lang === 'de') {
    panel.innerHTML = `
      <div class="hero-section mb-xl" style="padding:var(--space-xl);">
        <div class="flex items-center gap-lg flex-wrap">
          <div class="subject-icon mathe" style="width:64px;height:64px;font-size:32px;">📐</div>
          <div>
            <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">DIA — Deutsche Schule Valencia</div>
            <h1 style="font-size:24px;font-weight:900;">Mathematik GK — Abitur-Lehrmaterial</h1>
            <p style="color:var(--text-secondary);font-size:14px;margin-top:2px;">Zusammenfassung der verbindlichen Richtlinien und inhaltlichen Schwerpunkte.</p>
          </div>
        </div>
      </div>

      <div class="card mb-xl">
        <h2 style="margin-bottom:var(--space-lg);border-bottom:1px solid var(--glass-border);padding-bottom:var(--space-xs);">1. Aufbau der schriftlichen Abiturprüfung (NRW G9)</h2>
        <p style="color:var(--text-secondary);line-height:1.6;margin-bottom:var(--space-md);">
          Die schriftliche Abiturprüfung im Fach Mathematik (Grundkurs) gliedert sich ab dem Prüfungsjahr 2025/2027 in zwei Hauptteile:
        </p>
        <div class="grid-2 gap-lg mb-md">
          <div class="card" style="background:rgba(255,255,255,0.02);">
            <h3 style="font-weight:700;color:var(--color-mathe);margin-bottom:var(--space-sm);">Prüfungsteil A: Hilfsmittelfreier Teil (25 BE)</h3>
            <ul style="padding-left:20px;font-size:13px;color:var(--text-muted);line-height:1.6;">
              <li><strong>Pflichttteil (obligatorisch):</strong> 3 Aufgaben (je 1 aus Analysis, analytische Geometrie und Stochastik).</li>
              <li><strong>Wahlpflichtteil:</strong> 2 freie Aufgaben aus einem Pool von 6 Aufgaben (2 aus jedem Teilgebiet).</li>
              <li><strong>Einschränkung:</strong> Kein Taschenrechner und keine Formelsammlung zugelassen. Nur deutsches Wörterbuch.</li>
            </ul>
          </div>
          <div class="card" style="background:rgba(255,255,255,0.02);">
            <h3 style="font-weight:700;color:var(--color-mathe);margin-bottom:var(--space-sm);">Prüfungsteil B: Hilfsmittel-Teil (55 BE)</h3>
            <ul style="padding-left:20px;font-size:13px;color:var(--text-muted);line-height:1.6;">
              <li><strong>Umfang:</strong> 3 komplexe Aufgaben (1x Analysis, 1x Geometrie, 1x Stochastik).</li>
              <li><strong>Zugelassene Hilfsmittel:</strong> WTR (Wissenschaftlicher Taschenrechner) oder CAS/MMS, mathematische Formelsammlung und deutsches Wörterbuch.</li>
              <li>Die Schule erhält zwei Analysisaufgaben, wovon die Fachlehrkraft eine zur Bearbeitung auswählt.</li>
            </ul>
          </div>
        </div>
        <div class="highlight-box">
          ⚠️ <strong>Achtung Bewertungseinheiten:</strong> Ab 2025 beträgt die maximale Punktzahl <strong>80 BE</strong> (früher 100 BE) für Grundkurs und <strong>100 BE</strong> für Leistungskurs, bei gleicher Bearbeitungszeit (255 Minuten).
        </div>
      </div>

      <div class="card mb-xl">
        <h2 style="margin-bottom:var(--space-lg);border-bottom:1px solid var(--glass-border);padding-bottom:var(--space-xs);">2. Inhaltliche Schwerpunkte und Fokussierungen</h2>
        <div class="flex-col gap-md">
          <div class="card" style="background:rgba(255,255,255,0.01);border-left:4px solid var(--color-mathe);">
            <h3 style="font-weight:700;margin-bottom:var(--space-sm);">2.1 Analysis (Differential- und Integralrechnung)</h3>
            <ul style="padding-left:20px;font-size:13px;color:var(--text-secondary);line-height:1.7;">
              <li><strong>Ganzrationale & Exponentialfunktionen:</strong> Verhalten im Unendlichen ($x \to \pm\infty$), Definitions- und Wertebereiche, Symmetrieeigenschaften (Achsen-/Punktsymmetrie) und Nullstellen.</li>
              <li><strong>Differentialrechnung:</strong> Ableitung mittels Produktregel ($f(x)=u(x)\cdot v(x)$) und Kettenregel für Verkettungen von e-Funktionen mit linearen Funktionen ($e^{ax+b}$). Bestimmung von Extremwerten (Hoch-/Tiefpunkte) und Wendepunkten (Wendetangente). ReKonstruktion von Funktionstermen ("Steckbriefaufgaben").</li>
              <li><strong>Integralrechnung:</strong> Berechnung von orientierten Flächeninhalten mittels bestimmter Integrale. Stammfunktionen aufstellen (Hauptsatz der Differential- und Integralrechnung).</li>
            </ul>
          </div>

          <div class="card" style="background:rgba(255,255,255,0.01);border-left:4px solid var(--color-mathe);">
            <h3 style="font-weight:700;margin-bottom:var(--space-sm);">2.2 Analytische Geometrie und Lineare Algebra</h3>
            <ul style="padding-left:20px;font-size:13px;color:var(--text-secondary);line-height:1.7;">
              <li><strong>Vektoren:</strong> Skalarprodukt zweier Vektoren und Orthogonalitätsprüfung (Vektoren senkrecht wenn Skalarprodukt = 0).</li>
              <li><strong>Ebenen im Raum:</strong> Parameterform, Koordinatenform und Aufstellen des Normalenvektors. Schnittpunkte und Schnittwinkel (Gerade/Gerade, Gerade/Ebene, Ebene/Ebene).</li>
              <li><strong>Lagebeziehungen & Abstände:</strong> Abstandsformeln (z.B. Punkt zu Ebene mit Hessescher Normalenform).</li>
              <li><strong>Lineare Gleichungssysteme:</strong> Modellierung von mehrstufigen Produktionsprozessen mittels Matrizen.</li>
            </ul>
          </div>

          <div class="card" style="background:rgba(255,255,255,0.01);border-left:4px solid var(--color-mathe);">
            <h3 style="font-weight:700;margin-bottom:var(--space-sm);">2.3 Stochastik</h3>
            <ul style="padding-left:20px;font-size:13px;color:var(--text-secondary);line-height:1.7;">
              <li><strong>Bedingte Wahrscheinlichkeit:</strong> Baumdiagramme, Pfadregeln und Vierfeldertafeln zur Visualisierung von Ereignissen.</li>
              <li><strong>Binomialverteilung:</strong> Berechnung von Wahrscheinlichkeiten einer Bernoulli-Kette. Erwartungswert $\mu = n \cdot p$, Standardabweichung $\sigma = \sqrt{n \cdot p \cdot (1-p)}$.</li>
              <li><strong>Hypothesentests:</strong> Linksse        - Gesamtkosten: $K = \vec{k}_v \cdot \vec{e} + K_f$ &nbsp;($K_f$ sind Fixkosten)
            </div>
          </div>
        </div>
      </div>
    `;
  } else {
    panel.innerHTML = `
      <div class="hero-section mb-xl" style="padding:var(--space-xl);">
        <div class="flex items-center gap-lg flex-wrap">
          <div class="subject-icon mathe" style="width:64px;height:64px;font-size:32px;">📐</div>
          <div>
            <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">DIA — Deutsche Schule Valencia</div>
            <h1 style="font-size:24px;font-weight:900;">Matemáticas GK — Material Didáctico Abitur</h1>
            <p style="color:var(--text-secondary);font-size:14px;margin-top:2px;">Resumen traducido de las directrices oficiales y temas clave de evaluación.</p>
          </div>
        </div>
      </div>

      <div class="card mb-xl">
        <h2 style="margin-bottom:var(--space-lg);border-bottom:1px solid var(--glass-border);padding-bottom:var(--space-xs);">1. Estructura de la prueba escrita del Abitur (NRW G9)</h2>
        <p style="color:var(--text-secondary);line-height:1.6;margin-bottom:var(--space-md);">
          La prueba escrita del Abitur de Matemáticas para el nivel Grundkurs (GK) se estructura a partir de las reformas de 2025/2027 en dos partes diferenciadas:
        </p>
        <div class="grid-2 gap-lg mb-md">
          <div class="card" style="background:rgba(255,255,255,0.02);">
            <h3 style="font-weight:700;color:var(--color-mathe);margin-bottom:var(--space-sm);">Prueba A: Sin calculadora ni recursos (25 BE)</h3>
            <ul style="padding-left:20px;font-size:13px;color:var(--text-muted);line-height:1.6;">
              <li><strong>Pflichtteil (Obligatorio):</strong> 3 tareas (1 de Análisis, 1 de Geometría Vectorial y 1 de Estocástica). Todas se deben resolver.</li>
              <li><strong>Wahlpflichtteil (Optativo):</strong> Se proponen 6 tareas (2 de cada área). El alumno elige libremente y resuelve 2 de ellas.</li>
              <li><strong>Reglas:</strong> Prohibido el uso de calculadora científica, CAS y formularios de fórmulas. Solo se permite diccionario de alemán.</li>
            </ul>
          </div>
          <div class="card" style="background:rgba(255,255,255,0.02);">
            <h3 style="font-weight:700;color:var(--color-mathe);margin-bottom:var(--space-sm);">Prueba B: Con calculadora y recursos (55 BE)</h3>
            <ul style="padding-left:20px;font-size:13px;color:var(--text-muted);line-height:1.6;">
              <li><strong>Estructura:</strong> 3 problemas complejos (1 de Análisis, 1 de Geometría Analítica y 1 de Estocástica).</li>
              <li><strong>Opciones en Análisis:</strong> El tribunal envía dos problemas de análisis. El profesor del colegio elige uno de ellos para sus alumnos.</li>
              <li><strong>Recursos permitidos:</strong> Calculadora científica (WTR) o calculadora gráfica/CAS, formulario de fórmulas oficial y diccionario.</li>
            </ul>
          </div>
        </div>
        <div class="highlight-box">
          ⚠️ <strong>Importante sobre la puntuación:</strong> A partir de los exámenes de 2025, la prueba de Grundkurs (GK) se evalúa sobre un total de <strong>80 BE</strong> (antes 100 BE), mientras que Leistungskurs (LK) es sobre <strong>100 BE</strong>. El tiempo de examen se mantiene en 255 minutos.
        </div>
      </div>

      <div class="card mb-xl">
        <h2 style="margin-bottom:var(--space-lg);border-bottom:1px solid var(--glass-border);padding-bottom:var(--space-xs);">2. Temas clave del currículo unificado (Fokussierungen)</h2>
        <div class="flex-col gap-md">
          <div class="card" style="background:rgba(255,255,255,0.01);border-left:4px solid var(--color-mathe);">
            <h3 style="font-weight:700;margin-bottom:var(--space-sm);">2.1 Análisis (Analysis)</h3>
            <ul style="padding-left:20px;font-size:13px;color:var(--text-secondary);line-height:1.7;">
              <li><strong>Funciones polinómicas y exponenciales:</strong> Comportamiento asintótico en el infinito ($x \to \pm\infty$), dominios y rangos, simetrías (par/impar) y cálculo de raíces/ceros (Nullstellen).</li>
              <li><strong>Cálculo Diferencial:</strong> Regla del producto ($f(x)=u(x)\cdot v(x)$) y de la cadena para funciones exponenciales de exponente lineal ($e^{ax+b}$). Análisis de extremos relativos (Hochpunkt/Tiefpunkt) e inflexiones (Wendetangente). Reconstrucción de curvas a partir de condiciones dadas ("Steckbriefaufgaben").</li>
              <li><strong>Cálculo Integral:</strong> Cálculo de áreas orientadas y definidas bajo la curva. Teorema Fundamental del Cálculo (Hauptsatz der Differential- und Integralrechnung).</li>
            </ul>
          </div>

          <div class="card" style="background:rgba(255,255,255,0.01);border-left:4px solid var(--color-mathe);">
            <h3 style="font-weight:700;margin-bottom:var(--space-sm);">2.2 Geometría Analítica y Álgebra Lineal</h3>
            <ul style="padding-left:20px;font-size:13px;color:var(--text-secondary);line-height:1.7;">
              <li><strong>Vectores:</strong> Producto escalar (Skalarprodukt) y prueba de ortogonalidad (vectores perpendiculares si su producto escalar es 0).</li>
              <li><strong>Planos en el espacio:</strong> Ecuación paramétrica (Parameterform), ecuación cartesiana (Koordinatenform) y vector normal. Intersecciones y ángulos de inclinación (recta-recta, recta-plano, plano-plano).</li>
              <li><strong>Distancias y Posición Relativa:</strong> Distancia entre puntos, rectas y planos (fórmula de la normal de Hesse).</li>
              <li><strong>Sistemas de ecuaciones lineales (LGS):</strong> Aplicados al modelado de procesos productivos en varias etapas con matrices de costes y consumos.</li>
            </ul>
          </div>

          <div class="card" style="background:rgba(255,255,255,0.01);border-left:4px solid var(--color-mathe);">
            <h3 style="font-weight:700;margin-bottom:var(--space-sm);">2.3 Estocástica y Probabilidad</h3>
            <ul style="padding-left:20px;font-size:13px;color:var(--text-secondary);line-height:1.7;">
              <li><strong>Probabilidad condicional:</strong> Diagramas de árbol (diagrama de árbol ponderado), teorema de Bayes y tablas de contingencia de doble entrada (Vierfeldertafel).</li>
              <li><strong>Distribución binomial:</strong> Cálculo de probabilidades puntuales e integrales en cadenas de Bernoulli. Esperanza matemática $\mu = n \cdot p$, desviación típica $\sigma = \sqrt{n \cdot p \cdot (1-p)}$.</li>
              <li><strong>Test de Hipótesis:</strong> Planteamiento y cálculo del rango de rechazo (Ablehnungsbereich) en contrastes unilaterales izquierdos y derechos.</li>
            </ul>
          </div>
        </div>
      </div>


    `;
  }
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', () => {
  App.init();
  initPage();
});
</script>
<script src="js/auth.js"></script>
</body>
